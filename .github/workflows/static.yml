name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p dist/upi dist/ln
          cp -r UPI-SoundBox/. dist/upi/
          cp -r LN-SoundBox/. dist/ln/
          rm -rf dist/upi/.github dist/ln/.github
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><title>GGWave for SoundBox</title></head>
            <body style="font-family: system-ui; max-width: 640px; margin: 3rem auto;">
              <h1>GGWave for SoundBox</h1>
              <ul>
                <li><a href="./upi/">UPI SoundBox</a></li>
                <li><a href="./ln/">LN SoundBox</a></li>
              </ul>
            </body>
          </html>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
